<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termo de Números</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpg?v=1">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121213;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            border-bottom: 1px solid #3a3a3c;
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.3rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background-color: #1e1e1f;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* Grade de Linhas do Termo (6 tentativas) */
        .board {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
            align-items: center;
        }

        .board-row {
            display: flex;
            gap: 6px;
        }

        .tile {
            width: 52px;
            height: 52px;
            border: 2px solid #3a3a3c;
            border-radius: 4px;
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            user-select: none;
            transition: background-color 0.3s, border-color 0.3s;
        }

        /* Cores de feedback dos blocos */
        .tile.correct {
            background-color: #538d4e;
            border-color: #538d4e;
        }

        .tile.present {
            background-color: #b59f3b;
            border-color: #b59f3b;
        }

        .tile.absent {
            background-color: #3a3a3c;
            border-color: #3a3a3c;
            color: #787c7e;
        }

        /* Campo de Input Oculto e Botão de Enviar */
        .input-container {
            margin-bottom: 15px;
        }

        input[type="text"] {
            background-color: #121213;
            border: 2px solid #3a3a3c;
            color: white;
            font-size: 1.5rem;
            text-align: center;
            padding: 8px;
            width: 140px;
            border-radius: 5px;
            letter-spacing: 4px;
            font-weight: bold;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #538d4e;
        }

        .btn-main {
            background-color: #538d4e;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            transition: background-color 0.2s;
        }

        .btn-main:hover {
            background-color: #6aaa64;
        }

        /* Teclado de Números do Lado/Baixo */
        .keyboard {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 15px;
            background-color: #121213;
            padding: 12px;
            border-radius: 6px;
        }

        .key {
            background-color: #787c7e;
            color: white;
            border: none;
            border-radius: 4px;
            height: 45px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, opacity 0.2s;
        }

        /* Estados do Teclado baseado nos erros */
        .key.correct { background-color: #538d4e !important; }
        .key.present { background-color: #b59f3b !important; }
        .key.absent { 
            background-color: #3a3a3c !important; 
            opacity: 0.4; /* Leve transparência para indicar eliminação */
            color: #787c7e;
        }

        #message {
            margin: 15px 0;
            font-size: 1.1rem;
            font-weight: 600;
            min-height: 25px;
        }

        .success { color: #538d4e; }
        .error { color: #e74c3c; }

        .social-section {
            margin-top: 20px;
            border-top: 1px solid #3a3a3c;
            padding-top: 15px;
        }

        .social-buttons {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        .share-btn {
            background-color: #3a3a3c;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .insta-btn {
            background-color: #b63b7e;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Termo de Números</h1>
    </header>

    <div class="container">
        <div class="board" id="game-board"></div>

        <div class="input-container" id="action-area">
            <input type="text" id="player-guess" maxlength="4" placeholder="0000" autocomplete="off">
            <button id="btn-enviar" class="btn-main" onclick="verificarPalpite()">Enviar Palpite</button>
        </div>

        <div id="message"></div>
        <button id="btn-reiniciar" class="btn-main" onclick="reiniciarJogo()" style="display: none; background-color: #787c7e;">Jogar Novamente</button>

        <div class="keyboard" id="numeric-keyboard"></div>

        <div class="social-section">
            <div class="social-buttons">
                <button class="share-btn" onclick="copiarLink()">🔗 Copiar Link</button>
                <a class="insta-btn" href="https://www.instagram.com/arthur_motaik/" target="_blank">📸 @arthur_motaik</a>
            </div>
        </div>
    </div>

    <script>
        let numFinal = [];
        let tentativaAtual = 0;
        const maxTentativas = 6;
        let jogoAtivo = true;

        // Inicializa o layout da grade
        function criarTabuleiro() {
            const board = document.getElementById('game-board');
            board.innerHTML = "";
            for (let r = 0; r < maxTentativas; r++) {
                const row = document.createElement('div');
                row.className = 'board-row';
                for (let c = 0; c < 4; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.id = `tile-${r}-${c}`;
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        // Inicializa o teclado de 0 a 9
        function criarTeclado() {
            const keyboard = document.getElementById('numeric-keyboard');
            keyboard.innerHTML = "";
            const numeros = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0];
            numeros.forEach(num => {
                const key = document.createElement('button');
                key.className = 'key';
                key.innerText = num;
                key.id = `key-${num}`;
                key.onclick = () => {
                    const input = document.getElementById('player-guess');
                    if (input.value.length < 4 && jogoAtivo) {
                        input.value += num;
                    }
                };
                keyboard.appendChild(key);
            });
        }

        function gerarNumeroSecreto() {
            numFinal = [];
            for (let i = 0; i < 4; i++) {
                numFinal.push(Math.floor(Math.random() * 10));
            }
            console.log("Segredo:", numFinal.join(""));
        }

        function verificarPalpite() {
            if (!jogoAtivo || tentativaAtual >= maxTentativas) return;

            const inputElement = document.getElementById('player-guess');
            const guessStr = inputElement.value;
            const messageElement = document.getElementById('message');

            if (guessStr.length !== 4 || isNaN(guessStr)) {
                messageElement.className = "error";
                messageElement.innerText = "Digite exatamente 4 números.";
                return;
            }

            messageElement.innerText = "";
            let vetorPlayer = guessStr.split('').map(Number);
            let copiaSegredo = [...numFinal];
            let resultadoLinha = Array(4).fill("absent");

            // Primeira passada: checa os Verdes (Corretos)
            for (let i = 0; i < 4; i++) {
                if (vetorPlayer[i] === numFinal[i]) {
                    resultadoLinha[i] = "correct";
                    copiaSegredo[i] = null; 
                }
            }

            // Segunda passada: checa os Amarelos (Presentes)
            for (let i = 0; i < 4; i++) {
                if (resultadoLinha[i] !== "correct") {
                    let indexNoSegredo = copiaSegredo.indexOf(vetorPlayer[i]);
                    if (indexNoSegredo !== -1) {
                        resultadoLinha[i] = "present";
                        copiaSegredo[indexNoSegredo] = null;
                    }
                }
            }

            // Aplica a animação e cores nas caixas do tabuleiro
            for (let i = 0; i < 4; i++) {
                const tile = document.getElementById(`tile-${tentativaAtual}-${i}`);
                tile.innerText = vetorPlayer[i];
                tile.classList.add(resultadoLinha[i]);

                // Atualiza o Teclado Dinâmico com transparência/cores
                atualizarTeclado(vetorPlayer[i], resultadoLinha[i]);
            }

            // Verifica Vitória ou Fim de Jogo
            if (resultadoLinha.every(status => status === "correct")) {
                messageElement.className = "success";
                messageElement.innerText = `🎉 Sensacional! Você acertou em ${tentativaAtual + 1} tentativas!`;
                finalizarJogo();
            } else {
                tentativaAtual++;
                if (tentativaAtual >= maxTentativas) {
                    messageElement.className = "error";
                    messageElement.innerText = `💥 Fim de jogo! O número era ${numFinal.join('')}.`;
                    finalizarJogo();
                }
            }

            inputElement.value = "";
            inputElement.focus();
        }

        function atualizarTeclado(num, status) {
            const key = document.getElementById(`key-${num}`);
            if (!key) return;

            if (status === "correct") {
                key.className = "key correct";
            } else if (status === "present" && !key.classList.contains("correct")) {
                key.className = "key present";
            } else if (status === "absent" && !key.classList.contains("correct") && !key.classList.contains("present")) {
                key.className = "key absent";
            }
        }

        function finalizarJogo() {
            jogoAtivo = false;
            document.getElementById('btn-reiniciar').style.display = "block";
            document.getElementById('btn-enviar').style.display = "none";
            document.getElementById('player-guess').disabled = true;
        }

        function reiniciarJogo() {
            tentativaAtual = 0;
            jogoAtivo = true;
            document.getElementById('message').innerText = "";
            document.getElementById('btn-reiniciar').style.display = "none";
            document.getElementById('btn-enviar').style.display = "block";
            
            const inputElement = document.getElementById('player-guess');
            inputElement.disabled = false;
            inputElement.value = "";
            inputElement.focus();

            criarTabuleiro();
            criarTeclado();
            gerarNumeroSecreto();
        }

        function copiarLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert("Link copiado! Envie para seus amigos.");
            });
        }

        document.getElementById('player-guess').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verificarPalpite();
        });

        window.onload = () => {
            criarTabuleiro();
            criarTeclado();
            gerarNumeroSecreto();
        };
    </script>
</body>
</html>
